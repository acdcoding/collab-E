name: Enforce Branching Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  enforce-development-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          if [ "${{ github.head_ref }}" != "development" ]; then
            echo "Error: Pull requests to 'main' are only allowed from 'development'."
            echo "Please target your pull request to the 'development' branch instead."
            exit 1
          fi
